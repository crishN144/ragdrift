<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 252" width="800">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94a3b8"/>
    </marker>
    <marker id="r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="800" height="252" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="31"
    text-anchor="middle"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="13.5" font-weight="600" fill="#111827">Where ragdrift fits</text>

  <!-- ── Pipeline nodes ─────────────────────────────────────────────── -->

  <!-- Documents -->
  <rect x="50" y="52" width="108" height="46" rx="11"
    fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="104" y="80"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12.5" font-weight="500" fill="#1e40af">Documents</text>

  <!-- Ingestion -->
  <rect x="198" y="52" width="108" height="46" rx="11"
    fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="252" y="80"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12.5" font-weight="500" fill="#1e40af">Ingestion</text>

  <!-- Vector DB -->
  <rect x="346" y="52" width="108" height="46" rx="11"
    fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="80"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12.5" font-weight="500" fill="#1e40af">Vector DB</text>

  <!-- Retrieval -->
  <rect x="494" y="52" width="108" height="46" rx="11"
    fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="548" y="80"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12.5" font-weight="500" fill="#1e40af">Retrieval</text>

  <!-- Answer -->
  <rect x="642" y="52" width="108" height="46" rx="11"
    fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="696" y="80"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12.5" font-weight="500" fill="#1e40af">Answer</text>

  <!-- ── Arrows between pipeline nodes ──────────────────────────────── -->
  <line x1="160" y1="75" x2="196" y2="75" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="308" y1="75" x2="344" y2="75" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="456" y1="75" x2="492" y2="75" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="604" y1="75" x2="640" y2="75" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── Arrow: Ingestion → ragdrift ────────────────────────────────── -->
  <line x1="252" y1="100" x2="252" y2="147"
    stroke="#ef4444" stroke-width="1.75" marker-end="url(#r)"/>

  <!-- ── ragdrift node ──────────────────────────────────────────────── -->
  <rect x="174" y="149" width="156" height="56" rx="12"
    fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="252" y="174"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="15" font-weight="700" fill="#dc2626">ragdrift</text>
  <text x="252" y="191"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="9.5" fill="#f87171">silent drift detector</text>

  <!-- ── Caption ────────────────────────────────────────────────────── -->
  <text x="400" y="231"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="11" font-style="italic" fill="#9ca3af">detects ingestion drift before retrieval quality drops</text>
</svg>
