<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">

  <rect width="1280" height="320" fill="#1a1b26"/>

  <!-- Composition centered on x=640 -->
  <!-- Icon: 56x56 squares, 8px offset. Back square at (410,122) -->
  <rect x="410" y="122" width="56" height="56" rx="8" fill="#94a3b8"/>
  <rect x="418" y="130" width="56" height="56" rx="8" fill="#ff6b6b"/>

  <!-- Wordmark: cap-top ~y=120, baseline y=172 -->
  <text x="502" y="172"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="72" font-weight="700" letter-spacing="-1.5">
    <tspan fill="#e5e7eb">rag</tspan><tspan fill="#ff6b6b">drift</tspan>
  </text>

  <!-- Tagline: 28px below wordmark baseline, two lines -->
  <text x="504" y="207"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="17" font-weight="400" fill="#8892aa" letter-spacing="0.1">
    Your RAG pipeline is breaking.
  </text>
  <text x="504" y="229"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="17" font-weight="400" fill="#8892aa" letter-spacing="0.1">
    You just don&#x27;t know it yet.
  </text>

</svg>
