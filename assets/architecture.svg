<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 268" width="860">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94a3b8"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="860" height="268" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="31"
    text-anchor="middle"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="13.5" font-weight="600" fill="#111827">How ragdrift works</text>

  <!-- ── Sampler ────────────────────────────────────────────────────── -->
  <rect x="50" y="52" width="105" height="48" rx="11"
    fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="102" y="81"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12" font-weight="500" fill="#1e40af">Sampler</text>

  <!-- ── Extractor ───────────────────────────────────────────────────── -->
  <rect x="181" y="52" width="105" height="48" rx="11"
    fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="233" y="81"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12" font-weight="500" fill="#1e40af">Extractor</text>

  <!-- ── Differ (amber — the analysis stage) ───────────────────────── -->
  <rect x="312" y="52" width="105" height="48" rx="11"
    fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="364" y="73"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12" font-weight="500" fill="#92400e">Differ</text>
  <text x="364" y="89"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="8.5" fill="#b45309">struct · lex · sem</text>

  <!-- ── Prober (dashed border = conditional) ───────────────────────── -->
  <rect x="443" y="52" width="105" height="48" rx="11"
    fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="495" y="81"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12" font-weight="500" fill="#1e40af">Prober</text>

  <!-- ── Classifier ─────────────────────────────────────────────────── -->
  <rect x="574" y="52" width="105" height="48" rx="11"
    fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="626" y="81"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12" font-weight="500" fill="#dc2626">Classifier</text>

  <!-- ── Drift Report ───────────────────────────────────────────────── -->
  <rect x="705" y="52" width="105" height="48" rx="11"
    fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="757" y="81"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="11.5" font-weight="500" fill="#334155">Drift Report</text>

  <!-- ── Main flow arrows ───────────────────────────────────────────── -->
  <line x1="157" y1="76" x2="179" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="288" y1="76" x2="310" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="419" y1="76" x2="441" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="550" y1="76" x2="572" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="681" y1="76" x2="703" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── Annotation: if drift ≥ medium (near Differ→Prober) ─────────── -->
  <text x="430" y="114"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="9" fill="#9ca3af">if drift &#x2265; medium</text>

  <!-- ── Arrow: Classifier → Explainer (dashed purple) ─────────────── -->
  <line x1="626" y1="102" x2="626" y2="140"
    stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ap)"/>

  <!-- Annotation: explain flag label -->
  <text x="645" y="124"
    text-anchor="start"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="9" fill="#8b5cf6">if --explain</text>

  <!-- ── Explainer (purple — optional LLM) ─────────────────────────── -->
  <rect x="568" y="142" width="116" height="46" rx="11"
    fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="626" y="170"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12" font-weight="500" fill="#6d28d9">Explainer</text>

  <!-- ── Colour legend ──────────────────────────────────────────────── -->
  <text x="430" y="226"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="10" fill="#9ca3af">
    <tspan fill="#3b82f6">&#x25A0;</tspan><tspan> pipeline&#160;&#160;</tspan>
    <tspan fill="#f59e0b">&#x25A0;</tspan><tspan> diff engine&#160;&#160;</tspan>
    <tspan fill="#ef4444">&#x25A0;</tspan><tspan> classifier&#160;&#160;</tspan>
    <tspan fill="#8b5cf6">&#x25A0;</tspan><tspan> LLM / optional&#160;&#160;</tspan>
    <tspan fill="#64748b">&#x25A0;</tspan><tspan> output</tspan>
  </text>
  <text x="430" y="242"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="9.5" fill="#9ca3af">dashed border = conditional step</text>
</svg>
