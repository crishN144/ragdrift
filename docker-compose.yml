version: "3.9"

services:
  ragdrift:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  streamlit:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      bash -c "pip install -e '.[ui]' -q &&
               streamlit run ragdrift/app/streamlit_app.py
               --server.port 8501
               --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - ragdrift

volumes:
  qdrant_storage:
